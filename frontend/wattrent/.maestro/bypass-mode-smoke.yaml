# Smoke test for AUTH_BYPASS dev mode.
#
# When EXPO_PUBLIC_FIREBASE_* env vars are unset and the build is __DEV__,
# the AuthProvider injects a synthetic dev user and the app skips the
# sign-in screen entirely. This flow asserts that path.
appId: ${MAESTRO_APP_ID || 'app.wattrent'}
---
- launchApp:
    clearState: true
# Bypass mode lands straight on Home; no Sign-in screen.
# After clearState the JS bundle has to be re-downloaded from Metro on dev
# builds, which is slow on a cold emulator — give it a generous timeout.
- extendedWaitUntil:
    visible:
      text: "WattRent"
    timeout: 45000
- assertNotVisible:
    text: "Welcome back"
- tapOn:
    text: "History"
- assertVisible:
    text: "Bill History"
