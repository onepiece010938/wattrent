# ----------------------------------------------------------------------
# Frontend Native Build (EAS Build -> produces IPA / AAB)
#
# Trigger: manual only. Use when you change a native module / bump SDK / submit to the store.
# ----------------------------------------------------------------------

name: Frontend Build (EAS)

on:
  workflow_dispatch:
    inputs:
      profile:
        description: "EAS Build profile"
        required: true
        default: preview
        type: choice
        options: [development, preview, production]
      platform:
        description: "Platform"
        required: true
        default: all
        type: choice
        options: [ios, android, all]
      submit:
        description: "Submit to the store immediately after build?"
        required: true
        default: false
        type: boolean

concurrency:
  group: frontend-build-${{ github.event.inputs.profile }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    name: EAS Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/wattrent

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/wattrent/package-lock.json

      - uses: expo/expo-github-action@v8 # v8 is the latest stable (still on Node 20; upstream has not released v9)
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install
        run: npm ci

      - name: Build
        run: |
          SUBMIT_FLAG=""
          if [ "${{ github.event.inputs.submit }}" = "true" ]; then
            SUBMIT_FLAG="--auto-submit"
          fi
          eas build \
            --platform "${{ github.event.inputs.platform }}" \
            --profile "${{ github.event.inputs.profile }}" \
            --non-interactive \
            $SUBMIT_FLAG
