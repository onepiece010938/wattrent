# ----------------------------------------------------------------------
# Frontend OTA Update (push EAS Update; users pick up the new JS on next launch)
#
# When to use: JS-only changes (no native module changes, no Expo SDK upgrade)
# Trigger: push to main with changes under frontend/wattrent/app|components|services|lib|locales
# ----------------------------------------------------------------------

name: Frontend Update (EAS OTA)

on:
  push:
    branches: [main]
    paths:
      - "frontend/wattrent/app/**"
      - "frontend/wattrent/components/**"
      - "frontend/wattrent/services/**"
      - "frontend/wattrent/lib/**"
      - "frontend/wattrent/locales/**"
      - "frontend/wattrent/hooks/**"
      - "frontend/wattrent/utils/**"
      - "frontend/wattrent/app.config.js"
      - ".github/workflows/frontend-update.yml"
  workflow_dispatch:
    inputs:
      branch:
        description: "EAS Update branch (production temporarily locked; will reopen before launch)"
        required: true
        default: staging
        type: choice
        options: [staging, preview] # To enable prod, add `production` back

concurrency:
  group: frontend-update-${{ github.event.inputs.branch || 'staging' }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  update:
    name: EAS Update
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/wattrent

    env:
      EAS_BRANCH: ${{ github.event.inputs.branch || 'staging' }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/wattrent/package-lock.json

      - uses: expo/expo-github-action@v8 # v8 is the latest stable (still on Node 20; upstream has not released v9)
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install
        run: npm ci

      # WHY env-var indirection:
      #   Pasting `${{ github.event.head_commit.message }}` directly into a `run:`
      #   block lets commit-message bodies (e.g. "fix: foo\nbar: baz") be parsed as
      #   shell commands -> CWE-94 script injection. Passing through an env var
      #   forces the value to be a single argument.
      - name: Publish OTA
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          FALLBACK_MSG: Manual update from ${{ github.sha }}
        run: |
          MSG="${COMMIT_MSG:-$FALLBACK_MSG}"
          # Only the commit subject (first line) goes to EAS; the body can
          # contain quotes / newlines that confuse the dashboard view.
          MSG="${MSG%%$'\n'*}"
          eas update \
            --branch "$EAS_BRANCH" \
            --message "$MSG" \
            --non-interactive
