# ──────────────────────────────────────────────────────────────────────────
# Security: secret scan + dependency review
# ──────────────────────────────────────────────────────────────────────────

name: Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 3 * * 1" # Every Monday 03:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  # ---------------------- Gitleaks: hard-coded secret scan ----------------------──
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------- Dependency Review ----------------------
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  # ---------------------- Go vulncheck ----------------------
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          check-latest: true # Pull the latest patch (stdlib CVE fixes); do not use a stale cached version
          cache-dependency-path: backend/go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  # ---------------------- npm audit (frontend) ----------------------
  # WHY threshold is critical and not high:
  #   Expo SDK 53's @expo/cli / @expo/metro-config pin a bunch of high-severity
  #   transitive deps (tar / undici / glob / minimatch / node-forge / xmldom...).
  #   These are build-tools (run on dev / CI runner) and never get bundled
  #   into the user device, so the risk is low; clearing them out requires
  #   waiting for Expo to bump SDK or forking the lockfile, which is not worth it.
  #   If we ever bump Expo or a production package gets a critical CVE, CI will block.
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/wattrent
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/wattrent/package-lock.json

      - name: Audit (production deps, critical only)
        run: npm audit --omit=dev --audit-level=critical
