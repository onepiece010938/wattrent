# ──────────────────────────────────────────────────────────────────────────
# Security: secret scan + dependency review
# ──────────────────────────────────────────────────────────────────────────

name: Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 3 * * 1" # 每週一 03:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  # ────────────────────── Gitleaks 找硬編碼 secret ──────────────────────
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ────────────────────── Dependency Review ──────────────────────
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  # ────────────────────── Go vulncheck ──────────────────────
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          check-latest: true # 取最新 patch（stdlib CVE 修補）不要用 cache 舊版
          cache-dependency-path: backend/go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  # ────────────────────── npm audit（前端） ──────────────────────
  # ⚠️ 門檻設成 critical 而非 high。理由：
  #   Expo SDK 53 的 @expo/cli / @expo/metro-config 鎖了一堆有 high 漏洞
  #   的 transitive deps（tar / undici / glob / minimatch / node-forge / xmldom...）。
  #   這些都是 build-tool（跑在 dev / CI runner），不會被打包進 user device，
  #   風險低；要清掉只能等 Expo 升 SDK 或 fork 改 lockfile，得不償失。
  #   若哪天升 Expo 或 production 套件出 critical CVE，CI 會擋。
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/wattrent
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/wattrent/package-lock.json

      - name: Audit (production deps, critical only)
        run: npm audit --omit=dev --audit-level=critical
