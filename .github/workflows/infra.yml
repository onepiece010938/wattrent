# ----------------------------------------------------------------------
# Infra: Terraform plan (PR) / apply (main)
#
# Auth model:
#   - TFC API: TF_API_TOKEN (GitHub repo secret, HCP TFC personal or team token)
#   - GCP: TFC workspace env vars TFC_GCP_* -> the TFC runner automatically
#          exchanges with GCP STS for short-lived ADC and impersonates the
#          tfc-runner SA. The GitHub runner never touches a GCP credential.
#
# Execution mode: the TFC workspace MUST be set to "Remote"; all plans /
#   applies run on the TFC runner (the terraform CLI here only triggers and streams logs).
# ----------------------------------------------------------------------

name: Infra

on:
  pull_request:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/infra.yml"
  push:
    branches: [main]
    paths:
      - "terraform/**"
      - ".github/workflows/infra.yml"
  workflow_dispatch:
    inputs:
      env:
        description: "Target environment (production temporarily locked; will reopen before launch)"
        required: true
        default: staging
        type: choice
        options: [staging] # To enable prod, add `production` back; see the comment block at the top of this file
      action:
        description: "Action"
        required: true
        default: plan
        type: choice
        options: [plan, apply]

concurrency:
  group: infra-${{ github.event.inputs.env || 'staging' }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action || (github.event_name == 'pull_request' && 'plan' || 'apply') }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    env:
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      TF_WORKSPACE: ${{ github.event.inputs.env == 'production' && 'wattrent-production' || 'wattrent-staging' }}
      ENV_NAME: ${{ github.event.inputs.env || 'staging' }}

    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.15.2 # 1.10+ is required for cloud{} workspaces with key:value tags
          cli_config_credentials_token: ${{ secrets.TF_API_TOKEN }}

      - name: Init
        run: terraform init

      - name: Validate
        run: terraform validate -no-color

      - name: fmt check
        run: terraform fmt -check -recursive

      - name: Plan
        if: github.event_name == 'pull_request' || github.event.inputs.action == 'plan'
        run: |
          terraform plan \
            -var-file="envs/${{ env.ENV_NAME }}.tfvars" \
            -no-color \
            -out=tfplan \
            -detailed-exitcode || (code=$?; [ $code -eq 2 ] && true || exit $code)

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          terraform show -no-color tfplan > plan.txt
          {
            echo '## Terraform Plan (`'"${{ env.ENV_NAME }}"'`)'
            echo ''
            echo '```hcl'
            head -c 50000 plan.txt
            echo ''
            echo '```'
          } > comment.md
          gh pr comment "${{ github.event.pull_request.number }}" --body-file comment.md

      - name: Apply
        if: |
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
        run: |
          terraform apply \
            -var-file="envs/${{ env.ENV_NAME }}.tfvars" \
            -auto-approve
