# ──────────────────────────────────────────────────────────────────────────
# Firestore Deploy: rules + indexes
#
# 觸發：push to main 改了 firestore/
# 不用 firebase login（serviceaccount 走 gcloud auth + GOOGLE_APPLICATION_CREDENTIALS）
# ──────────────────────────────────────────────────────────────────────────

name: Firestore Deploy

on:
  push:
    branches: [main]
    paths:
      - "firestore/**"
      - "firebase.json"
      - ".github/workflows/firestore-deploy.yml"
  workflow_dispatch:
    inputs:
      env:
        description: "Target environment (production 暫時鎖住，發表前才開)"
        required: true
        default: staging
        type: choice
        options: [staging] # 要開 prod 請加回 production

concurrency:
  group: firestore-deploy-${{ github.event.inputs.env || 'staging' }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy rules & indexes
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.env || 'staging' }}

    env:
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}

    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@13

      - name: Deploy rules + indexes
        run: |
          firebase deploy \
            --project "$GCP_PROJECT_ID" \
            --only firestore:rules,firestore:indexes \
            --non-interactive \
            --force
