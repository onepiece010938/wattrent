# Free-tier E2E using Maestro + Android emulator on a GH-hosted runner.
#
# Triggers:
#   - nightly cron (catches regressions even if nobody pushes)
#   - workflow_dispatch (run on demand)
#   - any PR labelled `run-e2e` (so flaky PRs can opt-in without slowing
#     down every PR — Android emulator boots take 5-8 min)
#
# Cost: free for public repos; counts against the 2,000-min/month free tier
# for private repos. One run is roughly 12-18 min wall clock.
#
# Strategy:
#   1. Build a debug APK in CI using `eas build --local` (no EAS Cloud cost).
#   2. Boot an Android emulator on the Linux runner via
#      `reactivecircus/android-emulator-runner`.
#   3. Install Maestro CLI.
#   4. Install the APK + run the maestro flow suite.
#
# Maintenance note: every flow that needs Firebase Auth is skipped in CI
# because we don't seed credentials into the build; only the bypass-mode
# smoke flow runs by default. To run the auth flows in CI, populate the
# EXPO_PUBLIC_FIREBASE_* repository secrets and add the appropriate flow
# files to the `maestro test` invocation.
name: e2e-android-ci

on:
  schedule:
    - cron: "0 16 * * *" # 00:00 Asia/Taipei (UTC+8) = 16:00 UTC the day before
  workflow_dispatch:
    inputs:
      flows:
        description: "Flows to run (space-separated paths)"
        required: false
        default: ".maestro/bypass-mode-smoke.yaml"
  pull_request:
    types: [labeled]

permissions:
  contents: read

jobs:
  e2e:
    # Only run on the labelled PR event when the label is exactly run-e2e.
    if: github.event_name != 'pull_request' || github.event.label.name == 'run-e2e'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    defaults:
      run:
        working-directory: frontend/wattrent

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/wattrent/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install npm dependencies
        run: npm ci

      - name: Install Maestro CLI
        run: |
          curl -Ls https://get.maestro.mobile.dev | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      # Builds frontend/wattrent/android/app/build/outputs/apk/debug/app-debug.apk.
      # We use eas build --local with a debug profile so no remote EAS quota is
      # used and no credentials are required. The first run is slow (Gradle
      # downloads); GitHub's cache picks it up afterwards.
      - name: Prebuild Android project
        run: npx expo prebuild --platform android --no-install

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('frontend/wattrent/android/**/*.gradle*', 'frontend/wattrent/android/**/gradle-wrapper.properties') }}

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Enable KVM (Android emulator hardware accel)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Maestro flows
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_7
          working-directory: frontend/wattrent
          script: |
            adb install -r android/app/build/outputs/apk/debug/app-debug.apk
            # Default flow: bypass-mode smoke. Override via workflow_dispatch input.
            FLOWS="${{ github.event.inputs.flows || '.maestro/bypass-mode-smoke.yaml' }}"
            maestro test $FLOWS

      - name: Upload Maestro debug output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-debug-output
          path: |
            ~/.maestro/tests
            frontend/wattrent/.maestro/debug
          if-no-files-found: ignore
